<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 네이비 배경 -->
  <rect width="100" height="100" rx="20" fill="#1B2B45"/>

  <!-- 파치먼트 메달리온 -->
  <circle cx="50" cy="50" r="43" fill="#EDE6D6"/>

  <!-- 앤티크 골드 이중 링 -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#BF9B30" stroke-width="2.2"/>
  <circle cx="50" cy="50" r="39" fill="none" stroke="#BF9B30" stroke-width="0.8"/>

  <defs>
    <clipPath id="icon-clip">
      <circle cx="50" cy="50" r="43"/>
    </clipPath>
  </defs>

  <g clip-path="url(#icon-clip)">
    <!-- 갈기 (목 뒤) -->
    <path fill="#2E4066"
      d="M 22,80 C 15,68 14,55 20,44 L 26,44 C 20,55 20,67 26,80 Z"/>

    <!-- 말 머리·목 실루엣 -->
    <path fill="#1B2B45"
      d="M 22,84
         C 18,70 20,55 28,46
         C 32,40 34,33 33,24
         L 33,16
         L 37,7
         L 43,18
         C 47,18 53,22 58,29
         C 64,37 69,44 73,52
         C 76,58 76,63 73,67
         C 70,70 65,71 61,68
         C 55,65 48,63 42,66
         C 36,68 28,76 22,84 Z"/>

    <!-- 앞머리 갈기 -->
    <path fill="#2E4066"
      d="M 33,24 C 26,18 24,11 28,8 C 31,5 36,10 33,24 Z"/>

    <!-- 귀 안쪽 (밝은 하이라이트) -->
    <polygon points="37,10 39,7 41,17" fill="#EDE6D6" opacity="0.5"/>

    <!-- 눈 -->
    <ellipse cx="61" cy="32" rx="4" ry="3.2" fill="#EDE6D6"/>

    <!-- 콧구멍 -->
    <ellipse cx="73" cy="58" rx="3.2" ry="2.2" fill="#EDE6D6" opacity="0.65"/>
  </g>
</svg>
