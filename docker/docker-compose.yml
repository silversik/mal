services:
  postgres:
    image: postgres:16-alpine
    container_name: mal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mal_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-mal}
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mal} -d ${POSTGRES_DB:-mal}"]
      interval: 5s
      timeout: 5s
      retries: 10
